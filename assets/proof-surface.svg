<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="160" y1="60" x2="1280" y2="840" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F1728"/>
      <stop offset="1" stop-color="#050912"/>
    </linearGradient>
    <linearGradient id="cyanLine" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#00D4FF"/>
      <stop offset="1" stop-color="#51F0C0"/>
    </linearGradient>
    <linearGradient id="cardStroke" x1="260" y1="164" x2="1180" y2="744" gradientUnits="userSpaceOnUse">
      <stop stop-color="#25D8FF" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#4F7CFF" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1440" height="900" rx="36" fill="url(#bg)"/>
  <rect x="32" y="32" width="1376" height="836" rx="30" fill="#08111E" stroke="#17344F"/>
  <path d="M60 830H1380" stroke="#0D2335"/>
  <path d="M60 760H1380" stroke="#0D2335"/>
  <path d="M60 690H1380" stroke="#0D2335"/>
  <path d="M60 620H1380" stroke="#0D2335"/>
  <path d="M60 550H1380" stroke="#0D2335"/>
  <path d="M60 480H1380" stroke="#0D2335"/>
  <path d="M60 410H1380" stroke="#0D2335"/>
  <path d="M60 340H1380" stroke="#0D2335"/>
  <path d="M60 270H1380" stroke="#0D2335"/>
  <path d="M240 120V820" stroke="#0D2335"/>
  <path d="M460 120V820" stroke="#0D2335"/>
  <path d="M680 120V820" stroke="#0D2335"/>
  <path d="M900 120V820" stroke="#0D2335"/>
  <path d="M1120 120V820" stroke="#0D2335"/>

  <circle cx="1080" cy="170" r="210" fill="#0BD4FF" fill-opacity="0.05"/>
  <circle cx="1080" cy="170" r="150" fill="#0BD4FF" fill-opacity="0.04"/>
  <circle cx="1240" cy="700" r="180" fill="#4F7CFF" fill-opacity="0.06"/>

  <text x="90" y="110" fill="#8EA8C6" font-family="'Segoe UI', Arial, sans-serif" font-size="22" letter-spacing="4">CORTEX / PROOF SURFACE</text>
  <text x="90" y="170" fill="#F4FAFF" font-family="'Segoe UI Semibold', 'Segoe UI', Arial, sans-serif" font-size="54">Proof, not promises.</text>
  <text x="90" y="214" fill="#88A5C2" font-family="'Segoe UI', Arial, sans-serif" font-size="24">Real repo-backed metrics, local runtime architecture, and visible compression wins.</text>

  <g>
    <rect x="90" y="270" width="280" height="150" rx="22" fill="#0C1727" stroke="url(#cardStroke)"/>
    <text x="118" y="320" fill="#7F98B6" font-family="'Segoe UI', Arial, sans-serif" font-size="20">Ground truth precision</text>
    <text x="118" y="386" fill="#F9FDFF" font-family="'Segoe UI Semibold', 'Segoe UI', Arial, sans-serif" font-size="60">0.552</text>
    <text x="118" y="408" fill="#35D8FF" font-family="'Segoe UI', Arial, sans-serif" font-size="18">benchmark/baseline-v041.md</text>
  </g>

  <g>
    <rect x="396" y="270" width="280" height="150" rx="22" fill="#0C1727" stroke="url(#cardStroke)"/>
    <text x="424" y="320" fill="#7F98B6" font-family="'Segoe UI', Arial, sans-serif" font-size="20">Mean reciprocal rank</text>
    <text x="424" y="386" fill="#F9FDFF" font-family="'Segoe UI Semibold', 'Segoe UI', Arial, sans-serif" font-size="60">0.692</text>
    <text x="424" y="408" fill="#35D8FF" font-family="'Segoe UI', Arial, sans-serif" font-size="18">relevant answers rise fast</text>
  </g>

  <g>
    <rect x="702" y="270" width="280" height="150" rx="22" fill="#0C1727" stroke="url(#cardStroke)"/>
    <text x="730" y="320" fill="#7F98B6" font-family="'Segoe UI', Arial, sans-serif" font-size="20">Hit rate</text>
    <text x="730" y="386" fill="#F9FDFF" font-family="'Segoe UI Semibold', 'Segoe UI', Arial, sans-serif" font-size="60">0.900</text>
    <text x="730" y="408" fill="#35D8FF" font-family="'Segoe UI', Arial, sans-serif" font-size="18">most benchmark queries land</text>
  </g>

  <g>
    <rect x="1008" y="270" width="340" height="150" rx="22" fill="#0C1727" stroke="url(#cardStroke)"/>
    <text x="1036" y="320" fill="#7F98B6" font-family="'Segoe UI', Arial, sans-serif" font-size="20">Average latency</text>
    <text x="1036" y="386" fill="#F9FDFF" font-family="'Segoe UI Semibold', 'Segoe UI', Arial, sans-serif" font-size="60">97.5 ms</text>
    <text x="1036" y="408" fill="#35D8FF" font-family="'Segoe UI', Arial, sans-serif" font-size="18">fast enough to stay in the loop</text>
  </g>

  <g>
    <rect x="90" y="470" width="840" height="320" rx="28" fill="#091321" stroke="#16324B"/>
    <text x="120" y="520" fill="#F4FAFF" font-family="'Segoe UI Semibold', 'Segoe UI', Arial, sans-serif" font-size="30">Hybrid recall baseline</text>
    <text x="120" y="553" fill="#7795B4" font-family="'Segoe UI', Arial, sans-serif" font-size="18">A compact local stack can still deliver strong retrieval quality when ranking is designed carefully.</text>
    <path d="M138 718C212 690 270 642 344 630C418 618 448 660 522 626C596 592 640 548 714 524C788 500 830 510 902 470" stroke="url(#cyanLine)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
    <path d="M138 718C212 690 270 642 344 630C418 618 448 660 522 626C596 592 640 548 714 524C788 500 830 510 902 470" stroke="#B9F8FF" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="138" cy="718" r="8" fill="#0BD4FF"/>
    <circle cx="344" cy="630" r="8" fill="#0BD4FF"/>
    <circle cx="522" cy="626" r="8" fill="#0BD4FF"/>
    <circle cx="714" cy="524" r="8" fill="#0BD4FF"/>
    <circle cx="902" cy="470" r="8" fill="#51F0C0"/>
    <text x="122" y="756" fill="#7B97B3" font-family="'Consolas', 'Courier New', monospace" font-size="16">keyword</text>
    <text x="290" y="756" fill="#7B97B3" font-family="'Consolas', 'Courier New', monospace" font-size="16">semantic</text>
    <text x="465" y="756" fill="#7B97B3" font-family="'Consolas', 'Courier New', monospace" font-size="16">fusion</text>
    <text x="645" y="756" fill="#7B97B3" font-family="'Consolas', 'Courier New', monospace" font-size="16">compression</text>
    <text x="835" y="756" fill="#7B97B3" font-family="'Consolas', 'Courier New', monospace" font-size="16">warm boot</text>
  </g>

  <g>
    <rect x="966" y="470" width="382" height="320" rx="28" fill="#091321" stroke="#16324B"/>
    <text x="996" y="520" fill="#F4FAFF" font-family="'Segoe UI Semibold', 'Segoe UI', Arial, sans-serif" font-size="30">Local-first operating model</text>
    <text x="996" y="554" fill="#7795B4" font-family="'Segoe UI', Arial, sans-serif" font-size="18">The architecture is part of the product claim, not just a deployment detail.</text>

    <rect x="996" y="590" width="322" height="44" rx="16" fill="#0E1B2E"/>
    <text x="1018" y="619" fill="#BEEFFF" font-family="'Segoe UI Semibold', 'Segoe UI', Arial, sans-serif" font-size="20">SQLite persistence</text>
    <text x="1202" y="619" fill="#7EDBFF" font-family="'Consolas', 'Courier New', monospace" font-size="18">local</text>

    <rect x="996" y="646" width="322" height="44" rx="16" fill="#0E1B2E"/>
    <text x="1018" y="675" fill="#BEEFFF" font-family="'Segoe UI Semibold', 'Segoe UI', Arial, sans-serif" font-size="20">ONNX embeddings</text>
    <text x="1180" y="675" fill="#7EDBFF" font-family="'Consolas', 'Courier New', monospace" font-size="18">in-process</text>

    <rect x="996" y="702" width="322" height="44" rx="16" fill="#0E1B2E"/>
    <text x="1018" y="731" fill="#BEEFFF" font-family="'Segoe UI Semibold', 'Segoe UI', Arial, sans-serif" font-size="20">MCP + HTTP</text>
    <text x="1198" y="731" fill="#7EDBFF" font-family="'Consolas', 'Courier New', monospace" font-size="18">agent-ready</text>

    <text x="996" y="790" fill="#36E6B0" font-family="'Segoe UI Semibold', 'Segoe UI', Arial, sans-serif" font-size="24">Boot context compression: up to 97%</text>
  </g>
</svg>
