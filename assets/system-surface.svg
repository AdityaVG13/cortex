<svg width="1440" height="860" viewBox="0 0 1440 860" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="140" y1="80" x2="1260" y2="780" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0E1828"/>
      <stop offset="1" stop-color="#050912"/>
    </linearGradient>
    <linearGradient id="stroke" x1="220" y1="170" x2="1220" y2="700" gradientUnits="userSpaceOnUse">
      <stop stop-color="#29DBFF" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#4F7CFF" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="pathLine" x1="300" y1="520" x2="1140" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4BE0FF"/>
      <stop offset="0.5" stop-color="#7DA7FF"/>
      <stop offset="1" stop-color="#48E8B2"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1440" height="860" rx="34" fill="url(#bg)"/>
  <rect x="28" y="28" width="1384" height="804" rx="28" fill="#08111E" stroke="#17324A"/>
  <rect x="72" y="72" width="1296" height="716" rx="26" fill="#07101A" stroke="url(#stroke)"/>

  <circle cx="1180" cy="160" r="150" fill="#0BD4FF" fill-opacity="0.05"/>
  <circle cx="1080" cy="660" r="180" fill="#4F7CFF" fill-opacity="0.06"/>

  <text x="120" y="132" fill="#93AFCC" font-family="'Segoe UI', Arial, sans-serif" font-size="22" letter-spacing="4">CORTEX / OPERATING MODEL</text>
  <text x="120" y="190" fill="#F4FAFF" font-family="'Segoe UI Semibold', 'Segoe UI', Arial, sans-serif" font-size="56">One local memory system. Four product jobs.</text>
  <text x="120" y="228" fill="#88A5C2" font-family="'Segoe UI', Arial, sans-serif" font-size="24">Cortex captures durable context, ranks what matters, compresses it into a usable boot prompt, and serves it to any agent surface.</text>

  <path d="M266 530H1174" stroke="url(#pathLine)" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="332" cy="530" r="9" fill="#4BE0FF"/>
  <circle cx="604" cy="530" r="9" fill="#67C4FF"/>
  <circle cx="868" cy="530" r="9" fill="#7DA7FF"/>
  <circle cx="1110" cy="530" r="10" fill="#48E8B2"/>

  <g>
    <rect x="120" y="310" width="256" height="286" rx="24" fill="#0C1727" stroke="#16324B"/>
    <text x="150" y="354" fill="#7C99B6" font-family="'Consolas', 'Courier New', monospace" font-size="18">01 / Capture</text>
    <text x="150" y="412" fill="#F8FCFF" font-family="'Segoe UI Semibold', 'Segoe UI', Arial, sans-serif" font-size="36">Persist what matters.</text>
    <text x="150" y="456" fill="#8CA9C6" font-family="'Segoe UI', Arial, sans-serif" font-size="21">Decisions, memories, conflicts, and working context land in local storage instead of disappearing with the session.</text>
    <rect x="150" y="510" width="190" height="42" rx="14" fill="#101E31"/>
    <text x="172" y="537" fill="#BEEFFF" font-family="'Segoe UI Semibold', 'Segoe UI', Arial, sans-serif" font-size="18">SQLite + lifecycle safety</text>
  </g>

  <g>
    <rect x="416" y="310" width="256" height="286" rx="24" fill="#0C1727" stroke="#16324B"/>
    <text x="446" y="354" fill="#7C99B6" font-family="'Consolas', 'Courier New', monospace" font-size="18">02 / Rank</text>
    <text x="446" y="412" fill="#F8FCFF" font-family="'Segoe UI Semibold', 'Segoe UI', Arial, sans-serif" font-size="36">Retrieve with judgment.</text>
    <text x="446" y="456" fill="#8CA9C6" font-family="'Segoe UI', Arial, sans-serif" font-size="21">Hybrid recall combines keyword, semantic, and fused ranking so useful memory rises fast instead of sinking into long tails.</text>
    <rect x="446" y="510" width="188" height="42" rx="14" fill="#101E31"/>
    <text x="468" y="537" fill="#BEEFFF" font-family="'Segoe UI Semibold', 'Segoe UI', Arial, sans-serif" font-size="18">Tiered retrieval + RRF</text>
  </g>

  <g>
    <rect x="712" y="310" width="256" height="286" rx="24" fill="#0C1727" stroke="#16324B"/>
    <text x="742" y="354" fill="#7C99B6" font-family="'Consolas', 'Courier New', monospace" font-size="18">03 / Compress</text>
    <text x="742" y="412" fill="#F8FCFF" font-family="'Segoe UI Semibold', 'Segoe UI', Arial, sans-serif" font-size="36">Turn memory into boot context.</text>
    <text x="742" y="456" fill="#8CA9C6" font-family="'Segoe UI', Arial, sans-serif" font-size="21">Stable identity and recent delta are compiled into a smaller boot prompt so agents start informed without replaying the whole brain.</text>
    <rect x="742" y="510" width="176" height="42" rx="14" fill="#101E31"/>
    <text x="764" y="537" fill="#BEEFFF" font-family="'Segoe UI Semibold', 'Segoe UI', Arial, sans-serif" font-size="18">Capsule compiler</text>
  </g>

  <g>
    <rect x="1008" y="310" width="256" height="286" rx="24" fill="#0C1727" stroke="#16324B"/>
    <text x="1038" y="354" fill="#7C99B6" font-family="'Consolas', 'Courier New', monospace" font-size="18">04 / Serve</text>
    <text x="1038" y="412" fill="#F8FCFF" font-family="'Segoe UI Semibold', 'Segoe UI', Arial, sans-serif" font-size="36">Expose one shared brain.</text>
    <text x="1038" y="456" fill="#8CA9C6" font-family="'Segoe UI', Arial, sans-serif" font-size="21">Claude Code, Codex, Cursor, Gemini, local LLMs, HTTP clients, and the desktop app all connect to the same local source of truth.</text>
    <rect x="1038" y="510" width="166" height="42" rx="14" fill="#101E31"/>
    <text x="1060" y="537" fill="#BEEFFF" font-family="'Segoe UI Semibold', 'Segoe UI', Arial, sans-serif" font-size="18">Plugin + MCP + HTTP</text>
  </g>

  <rect x="120" y="654" width="1144" height="92" rx="22" fill="#0B1523" stroke="#16324B"/>
  <text x="154" y="706" fill="#D7E9FF" font-family="'Segoe UI Semibold', 'Segoe UI', Arial, sans-serif" font-size="28">Cortex is not a note bucket. It is an operating layer for memory.</text>
  <text x="802" y="706" fill="#35D8FF" font-family="'Segoe UI', Arial, sans-serif" font-size="20">Local persistence, retrieval judgment, compression economics, and multi-agent delivery in one system.</text>
</svg>
