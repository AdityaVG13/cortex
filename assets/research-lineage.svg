<svg width="1440" height="960" viewBox="0 0 1440 960" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="160" y1="40" x2="1260" y2="920" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0E1116"/>
      <stop offset="1" stop-color="#05070A"/>
    </linearGradient>
    <linearGradient id="panel" x1="160" y1="180" x2="1280" y2="880" gradientUnits="userSpaceOnUse">
      <stop stop-color="#11151B"/>
      <stop offset="1" stop-color="#0A0D11"/>
    </linearGradient>
    <linearGradient id="emerald" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#4AF2A1"/>
      <stop offset="1" stop-color="#21C77A"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#6EC7FF"/>
      <stop offset="1" stop-color="#4F7CFF"/>
    </linearGradient>
  </defs>

  <rect width="1440" height="960" rx="36" fill="url(#bg)"/>
  <rect x="28" y="28" width="1384" height="904" rx="28" fill="#07090C" stroke="#161C23"/>
  <rect x="56" y="56" width="1328" height="848" rx="24" fill="url(#panel)" stroke="#1A222B"/>

  <path d="M88 260H1352" stroke="#161C23"/>
  <path d="M88 430H1352" stroke="#161C23"/>
  <path d="M88 600H1352" stroke="#161C23"/>
  <path d="M88 770H1352" stroke="#161C23"/>
  <path d="M400 260V876" stroke="#161C23"/>
  <path d="M1038 260V876" stroke="#161C23"/>

  <rect x="94" y="88" width="320" height="36" rx="18" fill="#0E1512" stroke="#1E3A2A"/>
  <text x="118" y="112" fill="#66F3B2" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="600" letter-spacing="2">INSPIRED BY RESEARCH. BUILT FOR REAL WORK.</text>

  <text x="92" y="170" fill="#F5F7FA" font-family="'Segoe UI Semibold', 'Segoe UI', Arial, sans-serif" font-size="56">A cleaner map from influence to implementation.</text>
  <text x="92" y="214" fill="#9AA6B2" font-family="'Segoe UI', Arial, sans-serif" font-size="24">Cortex studies papers and open-source systems, then rebuilds the useful parts for a local-first, MCP-native memory product.</text>

  <rect x="1032" y="96" width="126" height="34" rx="17" fill="#0F1512" stroke="#244636"/>
  <text x="1064" y="118" fill="#74F7BA" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="600">LOCAL-FIRST</text>
  <rect x="1168" y="96" width="114" height="34" rx="17" fill="#10131A" stroke="#253348"/>
  <text x="1199" y="118" fill="#86C6FF" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="600">MCP-NATIVE</text>
  <rect x="1292" y="96" width="76" height="34" rx="17" fill="#121418" stroke="#2B3038"/>
  <text x="1313" y="118" fill="#D4DAE1" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="600">AUDITABLE</text>

  <text x="116" y="292" fill="#6D7884" font-family="'Consolas', 'Courier New', monospace" font-size="13" letter-spacing="2">REFERENCE CLUSTER</text>
  <text x="432" y="292" fill="#6D7884" font-family="'Consolas', 'Courier New', monospace" font-size="13" letter-spacing="2">HOW CORTEX ADAPTS IT</text>
  <text x="1070" y="292" fill="#6D7884" font-family="'Consolas', 'Courier New', monospace" font-size="13" letter-spacing="2">STATUS</text>

  <g>
    <rect x="94" y="324" width="288" height="122" rx="24" fill="#0D1014" stroke="#1D252F"/>
    <rect x="116" y="346" width="48" height="28" rx="14" fill="#101814" stroke="#244636"/>
    <text x="132" y="365" fill="#6DF3B5" font-family="'Consolas', 'Courier New', monospace" font-size="14" font-weight="700">01</text>
    <text x="178" y="365" fill="#F3F6F9" font-family="'Segoe UI Semibold', 'Segoe UI', Arial, sans-serif" font-size="26">Retrieval</text>
    <text x="116" y="400" fill="#AAB4BF" font-family="'Segoe UI', Arial, sans-serif" font-size="18">ByteRover, RRF, Hybrid Retrieval,</text>
    <text x="116" y="425" fill="#AAB4BF" font-family="'Segoe UI', Arial, sans-serif" font-size="18">DS@GT Fusion, agentmemory</text>

    <rect x="424" y="324" width="586" height="122" rx="24" fill="#0D1014" stroke="#1D252F"/>
    <text x="452" y="366" fill="#F3F6F9" font-family="'Segoe UI Semibold', 'Segoe UI', Arial, sans-serif" font-size="28">Progressive local recall with fused ranking.</text>
    <text x="452" y="401" fill="#9AA6B2" font-family="'Segoe UI', Arial, sans-serif" font-size="20">Cortex keeps the layered retrieval logic, but rebuilds it around a compact local stack:</text>
    <text x="452" y="428" fill="#9AA6B2" font-family="'Segoe UI', Arial, sans-serif" font-size="20">MiniLM, SQLite, MCP tooling, and room for reranking later.</text>

    <rect x="1062" y="324" width="278" height="122" rx="24" fill="#0F1512" stroke="#244636"/>
    <rect x="1084" y="346" width="116" height="30" rx="15" fill="url(#emerald)"/>
    <text x="1112" y="366" fill="#07120B" font-family="'Segoe UI', Arial, sans-serif" font-size="15" font-weight="700">IMPLEMENTED</text>
    <text x="1084" y="406" fill="#E7FFF3" font-family="'Segoe UI Semibold', 'Segoe UI', Arial, sans-serif" font-size="26">Phase 1 shipped</text>
    <text x="1084" y="432" fill="#9CE8C3" font-family="'Segoe UI', Arial, sans-serif" font-size="18">Reranking still future work</text>
  </g>

  <g>
    <rect x="94" y="494" width="288" height="122" rx="24" fill="#0D1014" stroke="#1D252F"/>
    <rect x="116" y="516" width="48" height="28" rx="14" fill="#11151A" stroke="#253348"/>
    <text x="132" y="535" fill="#8DCAFF" font-family="'Consolas', 'Courier New', monospace" font-size="14" font-weight="700">02</text>
    <text x="178" y="535" fill="#F3F6F9" font-family="'Segoe UI Semibold', 'Segoe UI', Arial, sans-serif" font-size="26">Structure</text>
    <text x="116" y="570" fill="#AAB4BF" font-family="'Segoe UI', Arial, sans-serif" font-size="18">Episodic Memory, MemoryBank,</text>
    <text x="116" y="595" fill="#AAB4BF" font-family="'Segoe UI', Arial, sans-serif" font-size="18">Memori, A-Mem</text>

    <rect x="424" y="494" width="586" height="122" rx="24" fill="#0D1014" stroke="#1D252F"/>
    <text x="452" y="536" fill="#F3F6F9" font-family="'Segoe UI Semibold', 'Segoe UI', Arial, sans-serif" font-size="28">Raw session traces now. Semantic structure next.</text>
    <text x="452" y="571" fill="#9AA6B2" font-family="'Segoe UI', Arial, sans-serif" font-size="20">Cortex already separates session history from durable decisions, then plans to add</text>
    <text x="452" y="598" fill="#9AA6B2" font-family="'Segoe UI', Arial, sans-serif" font-size="20">stronger dedup and relationship-aware memory objects in Phase 2.</text>

    <rect x="1062" y="494" width="278" height="122" rx="24" fill="#10131A" stroke="#253348"/>
    <rect x="1084" y="516" width="86" height="30" rx="15" fill="url(#blue)"/>
    <text x="1108" y="536" fill="#09111B" font-family="'Segoe UI', Arial, sans-serif" font-size="15" font-weight="700">MIXED</text>
    <text x="1084" y="576" fill="#EFF6FF" font-family="'Segoe UI Semibold', 'Segoe UI', Arial, sans-serif" font-size="26">Base shipped</text>
    <text x="1084" y="602" fill="#A9CCFF" font-family="'Segoe UI', Arial, sans-serif" font-size="18">Phase 2 deepens it</text>
  </g>

  <g>
    <rect x="94" y="664" width="288" height="122" rx="24" fill="#0D1014" stroke="#1D252F"/>
    <rect x="116" y="686" width="48" height="28" rx="14" fill="#11151A" stroke="#253348"/>
    <text x="132" y="705" fill="#8DCAFF" font-family="'Consolas', 'Courier New', monospace" font-size="14" font-weight="700">03</text>
    <text x="178" y="705" fill="#F3F6F9" font-family="'Segoe UI Semibold', 'Segoe UI', Arial, sans-serif" font-size="26">Lifecycle</text>
    <text x="116" y="740" fill="#AAB4BF" font-family="'Segoe UI', Arial, sans-serif" font-size="18">A-MAC, MemoryOS, FluxMem,</text>
    <text x="116" y="765" fill="#AAB4BF" font-family="'Segoe UI', Arial, sans-serif" font-size="18">RGMem, MemFactory</text>

    <rect x="424" y="664" width="586" height="122" rx="24" fill="#0D1014" stroke="#1D252F"/>
    <text x="452" y="706" fill="#F3F6F9" font-family="'Segoe UI Semibold', 'Segoe UI', Arial, sans-serif" font-size="28">Admission, maturity tiers, and better crystallization.</text>
    <text x="452" y="741" fill="#9AA6B2" font-family="'Segoe UI', Arial, sans-serif" font-size="20">Cortex takes the governance logic seriously, but stages it into explainable, operator-visible</text>
    <text x="452" y="768" fill="#9AA6B2" font-family="'Segoe UI', Arial, sans-serif" font-size="20">phases instead of hiding it behind an opaque policy engine from day one.</text>

    <rect x="1062" y="664" width="278" height="122" rx="24" fill="#10131A" stroke="#2F3E52"/>
    <rect x="1084" y="686" width="104" height="30" rx="15" fill="#E7ECF2"/>
    <text x="1112" y="706" fill="#0B0E13" font-family="'Segoe UI', Arial, sans-serif" font-size="15" font-weight="700">PLANNED</text>
    <text x="1084" y="746" fill="#F5F7FA" font-family="'Segoe UI Semibold', 'Segoe UI', Arial, sans-serif" font-size="26">Phase 4A-4C</text>
    <text x="1084" y="772" fill="#B3BDC8" font-family="'Segoe UI', Arial, sans-serif" font-size="18">Governance stack</text>
  </g>

  <g>
    <rect x="94" y="834" width="288" height="42" rx="21" fill="#0D1014" stroke="#1D252F"/>
    <text x="116" y="861" fill="#AAB4BF" font-family="'Segoe UI', Arial, sans-serif" font-size="18">MaaS, MemGPT, Collaborative Memory, MIRIX</text>

    <rect x="424" y="834" width="586" height="42" rx="21" fill="#0D1014" stroke="#1D252F"/>
    <text x="452" y="861" fill="#F3F6F9" font-family="'Segoe UI Semibold', 'Segoe UI', Arial, sans-serif" font-size="20">Shared daemon shipped; provenance, routing, and team-safe governance are the next layer.</text>

    <rect x="1062" y="834" width="278" height="42" rx="21" fill="#0D1014" stroke="#1D252F"/>
    <text x="1084" y="861" fill="#CFD6DE" font-family="'Segoe UI', Arial, sans-serif" font-size="18">Shared memory foundation: shipped + planned</text>
  </g>
</svg>
