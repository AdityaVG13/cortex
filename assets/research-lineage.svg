    <text x="570" y="394" fill="#84A2BF" font-family="'Segoe UI', Arial, sans-serif" font-size="18">Keyword + semantic + fusion inside a local daemon path</text>
    <text x="570" y="418" fill="#39DEFF" font-family="'Consolas', 'Courier New', monospace" font-size="16">shipped foundation, reranking still future work</text>

