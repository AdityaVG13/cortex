  <text x="96" y="108" fill="#8DA9C7" font-family="'Segoe UI', Arial, sans-serif" font-size="22" letter-spacing="4">CORTEX / RESEARCH LINEAGE</text>
  <text x="96" y="164" fill="#F4FAFF" font-family="'Segoe UI Semibold', 'Segoe UI', Arial, sans-serif" font-size="52">Research in. Product decisions out.</text>
  <text x="96" y="208" fill="#86A3C0" font-family="'Segoe UI', Arial, sans-serif" font-size="24">Cortex documents inspiration openly, then adapts it for a local-first, MCP-native, coding-focused memory system.</text>

