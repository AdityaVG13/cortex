name: ci

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

defaults:
  run:
    shell: bash

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      desktop: ${{ steps.filter.outputs.desktop }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Detect desktop changes
        id: filter
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36
        with:
          filters: |
            desktop:
              - "desktop/cortex-control-center/**"

  rust:
    name: Rust checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable

      - name: Cache Cargo
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            daemon-rs/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo build --release
        run: cargo build --manifest-path daemon-rs/Cargo.toml --release

      - name: cargo test
        run: cargo test --manifest-path daemon-rs/Cargo.toml

  clippy:
    name: Clippy gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable

      - name: Install rtk shim
        run: |
          mkdir -p "${HOME}/.local/bin"
          cat > "${HOME}/.local/bin/rtk" <<'EOF'
          #!/usr/bin/env bash
          exec "$@"
          EOF
          chmod +x "${HOME}/.local/bin/rtk"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      - name: Cache Cargo
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            daemon-rs/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: rtk cargo clippy --all-targets -- -D warnings
        run: rtk cargo clippy --all-targets -- -D warnings
        working-directory: daemon-rs

  spawn-audit:
    name: Spawn ownership audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Python
        uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d
        with:
          python-version: "3.11"

      - name: Enforce spawn path map
        run: python tools/audit_spawn_paths.py --strict

      - name: Spawn audit regression tests
        run: python -m pytest tools/tests/test_audit_spawn_paths.py -q

      - name: Enforce feature-intake guardrails
        run: python tools/validate_feature_intake.py

      - name: Feature-intake validator regression tests
        run: python -m pytest tools/tests/test_validate_feature_intake.py -q

  benchmarking-adapters:
    name: Benchmark adapter tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Python
        uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest

      - name: Run adapter tests
        run: python -m pytest benchmarking/adapters/tests -q

  chrome-extension-validation:
    name: Chrome extension validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22

      - name: Validate manifest + extension tests
        run: |
          node -e "JSON.parse(require('fs').readFileSync('extensions/cortex-chrome-extension/manifest.json', 'utf8'))"
          node --test extensions/cortex-chrome-extension/tests/core.test.mjs

      - name: Enforce Chrome Web Store policy guardrails
        run: python tools/validate_chrome_extension_policy.py

  python-sdk:
    name: Python SDK tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Python
        uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d
        with:
          python-version: "3.11"

      - name: Install SDK dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
        working-directory: sdks/python

      - name: Run Python SDK tests
        run: pytest -q
        working-directory: sdks/python

  typescript-sdk:
    name: TypeScript SDK tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22

      - name: Install SDK dependencies
        run: npm install --no-audit --no-fund
        working-directory: sdks/typescript

      - name: Run TypeScript SDK tests
        run: npm test
        working-directory: sdks/typescript

  plugin-validation:
    name: Plugin validation (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable

      - name: Build daemon release binary
        run: cargo build --manifest-path daemon-rs/Cargo.toml --release

      - name: Validate plugin scripts
        run: |
          node --check plugins/cortex-plugin/scripts/prepare-runtime.cjs
          node --check plugins/cortex-plugin/scripts/hook-boot.cjs
          node --check plugins/cortex-plugin/scripts/run-mcp.cjs
          node --test plugins/cortex-plugin/scripts/run-mcp.contract.test.cjs

      - name: Validate plugin JSON
        run: |
          node -e "JSON.parse(require('fs').readFileSync('plugins/cortex-plugin/.claude-plugin/plugin.json', 'utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('plugins/cortex-plugin/.mcp.json', 'utf8'))"

      - name: Plugin local routing dry-run smoke
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            CORTEX_BINARY="${PWD}/daemon-rs/target/release/cortex.exe"
          else
            CORTEX_BINARY="${PWD}/daemon-rs/target/release/cortex"
          fi
          if [ ! -f "${CORTEX_BINARY}" ]; then
            echo "expected daemon binary missing at ${CORTEX_BINARY}"
            exit 1
          fi
          LOG_FILE="$(mktemp)"
          CLAUDE_PLUGIN_ROOT="${PWD}/plugins/cortex-plugin" \
          CLAUDE_PLUGIN_DATA="$(mktemp -d)" \
          CORTEX_APP_BINARY="${CORTEX_BINARY}" \
          CORTEX_PLUGIN_DRY_RUN=1 \
          node plugins/cortex-plugin/scripts/run-mcp.cjs 2>&1 | tee "${LOG_FILE}"
          grep -q "MCP route: local (local service-first)" "${LOG_FILE}"
          grep -q "Dry run complete" "${LOG_FILE}"

  desktop:
    name: Desktop validation
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.desktop == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci
        working-directory: desktop/cortex-control-center

      - name: Build web frontend
        run: npm run web:build
        working-directory: desktop/cortex-control-center

      - name: Run desktop tests
        run: npm test
        working-directory: desktop/cortex-control-center

      - name: Install Expect agent
        if: vars.EXPECT_CLI_ENABLED == 'true'
        env:
          EXPECT_CLI_AGENT: ${{ vars.EXPECT_CLI_AGENT }}
        run: |
          case "${EXPECT_CLI_AGENT}" in
            codex)
              npm install -g @openai/codex
              ;;
            claude)
              npm install -g @anthropic-ai/claude-code
              ;;
            gemini)
              npm install -g @google/gemini-cli
              ;;
            copilot)
              npm install -g @github/copilot
              ;;
            opencode)
              npm install -g opencode-ai
              ;;
            droid)
              npm install -g droid
              ;;
            cursor)
              echo "EXPECT_CLI_AGENT=cursor is not installable on hosted runners; use a self-hosted runner or pick a CLI-installable agent."
              exit 1
              ;;
            "")
              echo "EXPECT_CLI_ENABLED=true but EXPECT_CLI_AGENT is unset."
              exit 1
              ;;
            *)
              echo "Unsupported EXPECT_CLI_AGENT=${EXPECT_CLI_AGENT}"
              exit 1
              ;;
          esac

      - name: Run desktop browser smoke
        if: vars.EXPECT_CLI_ENABLED == 'true'
        env:
          EXPECT_CLI_AGENT: ${{ vars.EXPECT_CLI_AGENT }}
          EXPECT_CLI_TIMEOUT: "600000"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: npm run expect:smoke:ci
        working-directory: desktop/cortex-control-center

  desktop-tauri:
    name: Desktop Tauri checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [changes]
    if: needs.changes.outputs.desktop == 'true'
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable

      - name: Cache Cargo
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/cortex-control-center/src-tauri/target
          key: ${{ runner.os }}-desktop-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-desktop-cargo-

      - name: cargo test
        run: cargo test --manifest-path desktop/cortex-control-center/src-tauri/Cargo.toml

      - name: cargo check
        run: cargo check --manifest-path desktop/cortex-control-center/src-tauri/Cargo.toml
