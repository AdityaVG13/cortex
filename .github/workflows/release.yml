name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os_name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os_name: linux-x86_64
            runner: ubuntu-latest
            archive_name: linux-x86_64
            archive_ext: tar.gz
            binary_name: cortex
          - os_name: windows-x86_64
            runner: windows-latest
            archive_name: windows-x86_64
            archive_ext: zip
            binary_name: cortex.exe
          - os_name: macos-x86_64
            runner: macos-13
            archive_name: macos-x86_64
            archive_ext: tar.gz
            binary_name: cortex
          - os_name: macos-aarch64
            runner: macos-14
            archive_name: macos-aarch64
            archive_ext: tar.gz
            binary_name: cortex

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: daemon-rs -> daemon-rs/target

      - name: Build release binary
        working-directory: daemon-rs
        run: cargo build --release

      - name: Package Unix archive
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          ARCHIVE="cortex-${GITHUB_REF_NAME}-${{ matrix.archive_name }}.${{ matrix.archive_ext }}"
          tar -czf "${ARCHIVE}" -C daemon-rs/target/release "${{ matrix.binary_name }}"
          echo "ARCHIVE=${ARCHIVE}" >> "${GITHUB_ENV}"

      - name: Package Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archive = "cortex-$env:GITHUB_REF_NAME-${{ matrix.archive_name }}.${{ matrix.archive_ext }}"
          Compress-Archive -Path "daemon-rs/target/release/${{ matrix.binary_name }}" -DestinationPath $archive -Force
          "ARCHIVE=$archive" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE }}
          path: ${{ env.ARCHIVE }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/cortex-${{ github.ref_name }}-windows-x86_64.zip
            dist/cortex-${{ github.ref_name }}-macos-aarch64.tar.gz
            dist/cortex-${{ github.ref_name }}-macos-x86_64.tar.gz
            dist/cortex-${{ github.ref_name }}-linux-x86_64.tar.gz
          generate_release_notes: true
