openapi: 3.0.3
info:
  title: Cortex Daemon API
  version: 0.2.0
  description: |
    OpenAPI surface for Custom GPT Actions and generic HTTP integrations.
    Protected routes require both `Authorization: Bearer <token>` and
    `X-Cortex-Request: true`.
servers:
  - url: http://127.0.0.1:7437
    description: Local Cortex daemon
paths:
  /health:
    get:
      summary: Health check
      operationId: health
      responses:
        '200':
          description: Daemon is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  stats:
                    type: object
  /recall:
    get:
      summary: Recall memories and decisions
      operationId: recall
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XCortexRequest'
        - in: query
          name: q
          required: true
          schema:
            type: string
          description: Recall query text
        - in: query
          name: k
          schema:
            type: integer
            default: 10
        - in: query
          name: budget
          schema:
            type: integer
            default: 200
      responses:
        '200':
          description: Recall results
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Unauthorized
        '403':
          description: Missing SSRF protection header
  /store:
    post:
      summary: Store a memory or decision
      operationId: store
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XCortexRequest'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreRequest'
      responses:
        '200':
          description: Entry stored
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Unauthorized
        '403':
          description: Missing SSRF protection header
  /export:
    get:
      summary: Export active data
      operationId: exportData
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XCortexRequest'
        - in: query
          name: format
          schema:
            type: string
            enum: [json, sql]
            default: json
      responses:
        '200':
          description: Export payload
          content:
            application/json:
              schema:
                type: object
            text/plain:
              schema:
                type: string
  /import:
    post:
      summary: Import exported data
      operationId: importData
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XCortexRequest'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImportPayload'
      responses:
        '200':
          description: Import counts
          content:
            application/json:
              schema:
                type: object
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Token
  parameters:
    XCortexRequest:
      in: header
      name: X-Cortex-Request
      required: true
      description: Required anti-SSRF marker for protected endpoints.
      schema:
        type: string
        enum: ["true"]
  schemas:
    StoreRequest:
      type: object
      properties:
        text:
          type: string
        decision:
          type: string
        context:
          type: string
        source:
          type: string
        source_agent:
          type: string
        confidence:
          type: number
      additionalProperties: true
    ImportPayload:
      type: object
      properties:
        memories:
          type: array
          items:
            $ref: '#/components/schemas/ImportMemory'
        decisions:
          type: array
          items:
            $ref: '#/components/schemas/ImportDecision'
    ImportMemory:
      type: object
      required: [text]
      properties:
        text:
          type: string
        source:
          type: string
        type:
          type: string
        tags:
          type: string
        source_agent:
          type: string
        confidence:
          type: number
        score:
          type: number
    ImportDecision:
      type: object
      required: [decision]
      properties:
        decision:
          type: string
        context:
          type: string
        type:
          type: string
        source_agent:
          type: string
        confidence:
          type: number
        score:
          type: number
