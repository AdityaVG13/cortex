openapi: 3.0.3
info:
  title: Cortex Daemon API
  version: 0.5.0
  description: |
    OpenAPI surface for Custom GPT Actions and generic HTTP integrations.
    Protected routes require both `Authorization: Bearer <token>` and
    `X-Cortex-Request: true`.
servers:
  - url: http://127.0.0.1:7437
    description: Local Cortex daemon
paths:
  /health:
    get:
      summary: Health check
      operationId: health
      responses:
        '200':
          description: Daemon is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok, degraded]
                  ready:
                    type: boolean
                  degraded:
                    type: boolean
                  embedding_status:
                    type: string
                    enum: [available, degraded, unavailable]
                  vector_search:
                    type: object
                    properties:
                      backend:
                        type: string
                      embedding_model:
                        type: object
                        properties:
                          key:
                            type: string
                          display_name:
                            type: string
                          dimension:
                            type: integer
                          model_file:
                            type: string
                          tokenizer_file:
                            type: string
                      embedding_inventory:
                        type: object
                        properties:
                          active_model_key:
                            type: string
                          active_model_embeddings:
                            type: integer
                          other_model_embeddings:
                            type: integer
                          unknown_model_embeddings:
                            type: integer
                          active_model_ratio:
                            type: number
                          reembed_backlog:
                            type: object
                            properties:
                              memories:
                                type: integer
                              decisions:
                                type: integer
                              total:
                                type: integer
                      sqlite_vec:
                        type: object
                        properties:
                          available:
                            type: boolean
                          version:
                            type: string
                            nullable: true
                          error:
                            type: string
                            nullable: true
                  stats:
                    type: object
                  runtime:
                    type: object
                    properties:
                      version:
                        type: string
                      mode:
                        type: string
                      port:
                        type: integer
                      db_path:
                        type: string
                      token_path:
                        type: string
                      pid_path:
                        type: string
                      ipc_endpoint:
                        type: string
                        nullable: true
                      ipc_kind:
                        type: string
                        nullable: true
                      executable:
                        type: string
                      owner:
                        type: string
                        nullable: true
  /readiness:
    get:
      summary: Readiness check
      operationId: readiness
      responses:
        '200':
          description: Daemon is ready to serve traffic
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'
        '503':
          description: Daemon is still starting
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'
  /recall:
    get:
      summary: Recall memories and decisions
      operationId: recall
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XCortexRequest'
        - in: query
          name: q
          required: true
          schema:
            type: string
          description: Recall query text
        - in: query
          name: k
          schema:
            type: integer
            default: 10
        - in: query
          name: budget
          schema:
            type: integer
            default: 200
      responses:
        '200':
          description: Recall results
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Unauthorized
        '403':
          description: Missing SSRF protection header
  /recall/explain:
    get:
      summary: Recall with explain payload
      operationId: recallExplain
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XCortexRequest'
        - in: query
          name: q
          required: true
          schema:
            type: string
          description: Recall query text
        - in: query
          name: k
          schema:
            type: integer
            default: 8
        - in: query
          name: pool_k
          schema:
            type: integer
            default: 32
        - in: query
          name: budget
          schema:
            type: integer
            default: 220
      responses:
        '200':
          description: Recall results with ranking/routing explain metadata
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Unauthorized
        '403':
          description: Missing SSRF protection header
  /stats:
    get:
      summary: Retrieval and routing telemetry summary
      operationId: stats
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XCortexRequest'
      responses:
        '200':
          description: Stats snapshot
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Unauthorized
        '403':
          description: Missing SSRF protection header
  /store:
    post:
      summary: Store a memory or decision
      operationId: store
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XCortexRequest'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreRequest'
      responses:
        '200':
          description: Entry stored
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Unauthorized
        '403':
          description: Missing SSRF protection header
  /export:
    get:
      summary: Export active data
      operationId: exportData
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XCortexRequest'
        - in: query
          name: format
          schema:
            type: string
            enum: [json, sql]
            default: json
      responses:
        '200':
          description: Export payload
          content:
            application/json:
              schema:
                type: object
            text/plain:
              schema:
                type: string
  /import:
    post:
      summary: Import exported data
      operationId: importData
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XCortexRequest'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImportPayload'
      responses:
        '200':
          description: Import counts
          content:
            application/json:
              schema:
                type: object
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Token
  parameters:
    XCortexRequest:
      in: header
      name: X-Cortex-Request
      required: true
      description: Required anti-SSRF marker for protected endpoints.
      schema:
        type: string
        enum: ["true"]
  schemas:
    ReadinessResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ready, starting]
        ready:
          type: boolean
        runtime:
          type: object
        stats:
          type: object
    StoreRequest:
      type: object
      properties:
        text:
          type: string
        decision:
          type: string
        context:
          type: string
        source:
          type: string
        source_agent:
          type: string
        confidence:
          type: number
      additionalProperties: true
    ImportPayload:
      type: object
      properties:
        memories:
          type: array
          items:
            $ref: '#/components/schemas/ImportMemory'
        decisions:
          type: array
          items:
            $ref: '#/components/schemas/ImportDecision'
    ImportMemory:
      type: object
      required: [text]
      properties:
        text:
          type: string
        source:
          type: string
        type:
          type: string
        tags:
          type: string
        source_agent:
          type: string
        confidence:
          type: number
        score:
          type: number
    ImportDecision:
      type: object
      required: [decision]
      properties:
        decision:
          type: string
        context:
          type: string
        type:
          type: string
        source_agent:
          type: string
        confidence:
          type: number
        score:
          type: number
